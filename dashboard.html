<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Zentor | لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #2a7de1;
      --primary-hover: #1a67c4;
      --primary-light: #e8f1fc;
      --background: #f4f7fc;
      --card: #ffffff;
      --text: #0b1e33;
      --text-secondary: #5a6d80;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
      --glass-bg: rgba(255,255,255,0.65);
      --glass-border: rgba(255,255,255,0.4);
      --glass-blur: blur(14px);
      --radius: 16px;
      --radius-lg: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-width: 260px;
    }
    .dark {
      --background: #0b0e14;
      --card: #1a1f2b;
      --text: #eef2f6;
      --text-secondary: #9aa4b2;
      --border: #2a3140;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow: 0 4px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.4);
      --glass-bg: rgba(26,31,43,0.7);
      --glass-border: rgba(255,255,255,0.08);
      --primary-light: #1a2b44;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }
    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform var(--transition), left var(--transition), right var(--transition);
      padding: 1.5rem 1rem;
    }
    [dir="rtl"] .sidebar { right: 0; border-right: none; border-left: 1px solid var(--glass-border); }
    [dir="ltr"] .sidebar { left: 0; }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .sidebar-logo i { font-size: 1.6rem; }
    .sidebar-nav { flex:1; display:flex; flex-direction: column; gap: 0.4rem; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: all var(--transition);
    }
    .sidebar-link i { width: 20px; text-align: center; }
    .sidebar-link:hover { background: var(--primary-light); color: var(--primary); }
    .sidebar-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(42,125,225,0.3); }
    .sidebar-footer { margin-top: auto; }
    .logout-btn {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

    /* Main content */
    .main {
      flex: 1;
      margin-right: var(--sidebar-width);
      padding: 1.5rem;
      transition: margin var(--transition);
    }
    [dir="ltr"] .main { margin-right: 0; margin-left: var(--sidebar-width); }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .hamburger {
      display: none;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .page-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
    }
    .top-actions { display: flex; gap: 0.5rem; }
    .action-btn {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 1rem;
    }
    .action-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    /* Overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: transform var(--transition);
      cursor: default;
    }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-icon {
      width: 56px; height: 56px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--primary);
    }
    .stat-info h3 { font-size: 1.6rem; font-weight: 700; }
    .stat-info p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.2rem; }
    /* Section */
    .section {
      margin-bottom: 2rem;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .section-title { font-size: 1.3rem; font-weight: 700; }
    .see-all {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
      gap: 1.25rem;
    }
    .course-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 1.4rem;
      border: 1px solid var(--border);
      transition: all var(--transition);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .course-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    .course-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.8rem; }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin: 0.8rem 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #4d9eff);
      border-radius: 8px;
      width: 0%;
      transition: width 0.5s ease;
    }
    .progress-text { display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.8rem; }
    /* Activities */
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .activity-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid var(--border);
    }
    .activity-dot {
      width: 12px; height: 12px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .activity-text { flex:1; }
    .activity-text strong { display: block; }
    .activity-time { font-size: 0.8rem; color: var(--text-secondary); }
    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, transparent 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-text { height: 1rem; width: 100%; margin-bottom: 0.5rem; }
    .skeleton-title { height: 1.4rem; width: 60%; }
    .skeleton-avatar { width: 56px; height: 56px; border-radius: 16px; }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }
    .empty-state i { font-size: 3rem; color: var(--border); margin-bottom: 1rem; }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.9rem 1.8rem;
      border-radius: 50px;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 0.5rem;
      animation: slideUp 0.4s ease-out;
      max-width: 90vw;
    }
    .toast-error { background: #fee2e2; color: #991b1b; border:1px solid #fecaca; }
    .toast-success { background: #dcfce7; color: #166534; border:1px solid #bbf7d0; }
    @keyframes slideUp {
      from { opacity:0; transform: translateX(-50%) translateY(20px); }
      to { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(100%);
      }
      [dir="ltr"] .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-right: 0; margin-left: 0; }
      .hamburger { display: flex; }
      .sidebar-overlay.active { display: block; }
      .stats-grid { grid-template-columns: 1fr; }
      .courses-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <a href="dashboard.html" class="sidebar-logo">
    <i class="fas fa-graduation-cap"></i> Zentor
  </a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link active"><i class="fas fa-th-large"></i> لوحة التحكم</a>
    <a href="my-courses.html" class="sidebar-link"><i class="fas fa-book-open"></i> كورساتي</a>
    <a href="browse-teachers.html" class="sidebar-link"><i class="fas fa-chalkboard-teacher"></i> المعلمين</a>
    <a href="assignments.html" class="sidebar-link"><i class="fas fa-tasks"></i> الواجبات</a>
    <a href="messages.html" class="sidebar-link"><i class="fas fa-comments"></i> الرسائل</a>
    <a href="profile.html" class="sidebar-link"><i class="fas fa-user-circle"></i> الملف الشخصي</a>
    <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> الإعدادات</a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
  </div>
</div>
<div class="sidebar-overlay" id="overlay"></div>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    <h1 class="page-title">لوحة التحكم</h1>
    <div class="top-actions">
      <button class="action-btn" id="langToggle" title="English"><i class="fas fa-globe"></i></button>
      <button class="action-btn" id="darkToggle" title="الوضع الليلي"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card skeleton"><div class="skeleton-avatar skeleton"></div><div class="stat-info"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div></div></div>
    <div class="stat-card skeleton"><div class="skeleton-avatar skeleton"></div><div class="stat-info"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div></div></div>
    <div class="stat-card skeleton"><div class="skeleton-avatar skeleton"></div><div class="stat-info"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div></div></div>
  </div>

  <!-- Current Courses -->
  <div class="section">
    <div class="section-header"><h2 class="section-title">كورساتي الحالية</h2><a href="my-courses.html" class="see-all">عرض الكل</a></div>
    <div class="courses-grid" id="coursesGrid">
      <div class="course-card"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div><div class="skeleton" style="height:8px;"></div></div>
    </div>
    <div class="empty-state" id="coursesEmpty" style="display:none;"><i class="fas fa-book-open"></i><p>لا توجد كورسات بعد</p></div>
  </div>

  <!-- Recent Activities -->
  <div class="section">
    <div class="section-header"><h2 class="section-title">آخر النشاطات</h2></div>
    <div class="activity-list" id="activitiesList">
      <div class="activity-item"><div class="skeleton" style="width:12px;height:12px;border-radius:50%;"></div><div class="activity-text"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton" style="width:60%;"></div></div></div>
    </div>
    <div class="empty-state" id="activitiesEmpty" style="display:none;"><i class="fas fa-history"></i><p>لا توجد نشاطات حديثة</p></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, getDocs, query, where, orderBy, limit, Timestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
    authDomain: "zentor-caaf1.firebaseapp.com",
    projectId: "zentor-caaf1",
    storageBucket: "zentor-caaf1.firebasestorage.app",
    messagingSenderId: "681267238383",
    appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
    measurementId: "G-X80GNJHMS5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // UI elements
  const html = document.documentElement;
  const darkToggle = document.getElementById('darkToggle');
  const langToggle = document.getElementById('langToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const hamburger = document.getElementById('hamburger');
  const statsGrid = document.getElementById('statsGrid');
  const coursesGrid = document.getElementById('coursesGrid');
  const coursesEmpty = document.getElementById('coursesEmpty');
  const activitiesList = document.getElementById('activitiesList');
  const activitiesEmpty = document.getElementById('activitiesEmpty');
  const toast = document.getElementById('toast');

  let currentStudentId = null;

  // Toast
  function showToast(msg, type='error') {
    toast.textContent = msg;
    toast.className = `toast toast-${type}`;
    toast.style.display = 'flex';
    clearTimeout(window._t);
    window._t = setTimeout(() => toast.style.display = 'none', 4000);
  }

  // Dark mode
  function setDarkMode(on) {
    html.classList.toggle('dark', on);
    darkToggle.innerHTML = on ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('zentor_dark_mode', on);
  }
  darkToggle.addEventListener('click', ()=> setDarkMode(!html.classList.contains('dark')));
  setDarkMode(localStorage.getItem('zentor_dark_mode') === 'true');

  // Language
  function setLang(lang) {
    html.dir = lang === 'ar' ? 'rtl' : 'ltr';
    html.lang = lang;
    langToggle.title = lang === 'ar' ? 'English' : 'العربية';
    // Update sidebar links & titles
    document.querySelector('.page-title').textContent = lang === 'ar' ? 'لوحة التحكم' : 'Dashboard';
    document.querySelectorAll('.sidebar-link')[0].innerHTML = lang === 'ar' ? '<i class="fas fa-th-large"></i> لوحة التحكم' : '<i class="fas fa-th-large"></i> Dashboard';
    document.querySelectorAll('.sidebar-link')[1].innerHTML = lang === 'ar' ? '<i class="fas fa-book-open"></i> كورساتي' : '<i class="fas fa-book-open"></i> My Courses';
    document.querySelectorAll('.sidebar-link')[2].innerHTML = lang === 'ar' ? '<i class="fas fa-chalkboard-teacher"></i> المعلمين' : '<i class="fas fa-chalkboard-teacher"></i> Teachers';
    document.querySelectorAll('.sidebar-link')[3].innerHTML = lang === 'ar' ? '<i class="fas fa-tasks"></i> الواجبات' : '<i class="fas fa-tasks"></i> Assignments';
    document.querySelectorAll('.sidebar-link')[4].innerHTML = lang === 'ar' ? '<i class="fas fa-comments"></i> الرسائل' : '<i class="fas fa-comments"></i> Messages';
    document.querySelectorAll('.sidebar-link')[5].innerHTML = lang === 'ar' ? '<i class="fas fa-user-circle"></i> الملف الشخصي' : '<i class="fas fa-user-circle"></i> Profile';
    document.querySelectorAll('.sidebar-link')[6].innerHTML = lang === 'ar' ? '<i class="fas fa-cog"></i> الإعدادات' : '<i class="fas fa-cog"></i> Settings';
    document.getElementById('logoutBtn').innerHTML = lang === 'ar' ? '<i class="fas fa-sign-out-alt"></i> تسجيل الخروج' : '<i class="fas fa-sign-out-alt"></i> Logout';
    document.querySelector('.section-title').textContent = lang === 'ar' ? 'كورساتي الحالية' : 'Current Courses';
    document.querySelector('.see-all').textContent = lang === 'ar' ? 'عرض الكل' : 'View All';
    document.querySelectorAll('.section-title')[1].textContent = lang === 'ar' ? 'آخر النشاطات' : 'Recent Activities';
    localStorage.setItem('zentor_lang', lang);
  }
  langToggle.addEventListener('click', ()=> setLang(html.lang === 'ar' ? 'en' : 'ar'));
  setLang(localStorage.getItem('zentor_lang') || 'ar');

  // Sidebar toggle
  hamburger.addEventListener('click', ()=>{
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', ()=>{
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    await signOut(auth);
    window.location.href = 'login.html';
  });

  // Auth state
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentStudentId = user.uid;

    // Check student profile
    const profileSnap = await getDoc(doc(db, 'students', user.uid, 'profile', 'info'));
    if (!profileSnap.exists()) {
      await signOut(auth);
      showToast('هذا الحساب ليس حساب طالب');
      setTimeout(()=> window.location.href = 'login.html', 2000);
      return;
    }

    // Load dashboard data
    loadDashboard(user.uid);
  });

  async function loadDashboard(uid) {
    try {
      // Fetch enrolled courses
      const coursesSnap = await getDocs(collection(db, 'students', uid, 'courses'));
      const courses = [];
      coursesSnap.forEach(doc => courses.push({ id: doc.id, ...doc.data() }));

      // Stats
      const totalCourses = courses.length;
      const avgProgress = totalCourses ? Math.round(courses.reduce((sum, c) => sum + (c.progress || 0), 0) / totalCourses) : 0;

      // Pending assignments: loop through courses, get assignments, check submissions
      let pendingAssignments = 0;
      for (const course of courses) {
        const teacherId = course.teacherId;
        const courseId = course.courseId;
        if (!teacherId || !courseId) continue;
        const assignmentsQuery = query(collection(db, 'teachers', teacherId, 'assignments'), where('courseId', '==', courseId));
        const assignmentsSnap = await getDocs(assignmentsQuery);
        for (const assignmentDoc of assignmentsSnap.docs) {
          const submissionRef = doc(db, 'teachers', teacherId, 'assignments', assignmentDoc.id, 'submissions', uid);
          const submissionSnap = await getDoc(submissionRef);
          if (!submissionSnap.exists()) {
            pendingAssignments++;
          }
        }
      }

      // Render stats
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-book-open"></i></div>
          <div class="stat-info"><h3>${totalCourses}</h3><p>${html.lang==='ar'?'كورس':'Courses'}</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
          <div class="stat-info"><h3>${avgProgress}%</h3><p>${html.lang==='ar'?'نسبة التقدم':'Progress'}</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-tasks"></i></div>
          <div class="stat-info"><h3>${pendingAssignments}</h3><p>${html.lang==='ar'?'واجبات معلقة':'Pending'}</p></div>
        </div>
      `;

      // Render courses (last 4)
      if (totalCourses === 0) {
        coursesGrid.innerHTML = '';
        coursesEmpty.style.display = 'block';
      } else {
        coursesEmpty.style.display = 'none';
        const displayCourses = courses.slice(0, 4);
        coursesGrid.innerHTML = displayCourses.map(c => `
          <a href="course-details.html?courseId=${c.courseId}&teacherId=${c.teacherId}" class="course-card">
            <div class="course-name">${c.courseName || 'كورس بدون عنوان'}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${c.progress || 0}%"></div></div>
            <div class="progress-text"><span>${c.progress || 0}%</span><span>${html.lang==='ar'?'مكتمل':'Complete'}</span></div>
          </a>
        `).join('');
      }

      // Recent activities (from students/{uid}/activities)
      const activitiesQuery = query(collection(db, 'students', uid, 'activities'), orderBy('timestamp', 'desc'), limit(5));
      const activitiesSnap = await getDocs(activitiesQuery);
      if (activitiesSnap.empty) {
        activitiesList.innerHTML = '';
        activitiesEmpty.style.display = 'block';
      } else {
        activitiesEmpty.style.display = 'none';
        activitiesList.innerHTML = '';
        activitiesSnap.forEach(doc => {
          const data = doc.data();
          const time = data.timestamp?.toDate ? data.timestamp.toDate() : new Date();
          const timeStr = time.toLocaleDateString(html.lang==='ar'?'ar-EG':'en-US', { month:'short', day:'numeric' });
          activitiesList.innerHTML += `
            <div class="activity-item">
              <div class="activity-dot"></div>
              <div class="activity-text">
                <strong>${data.description || 'نشاط'}</strong>
                <span class="activity-time">${timeStr}</span>
              </div>
            </div>
          `;
        });
      }
    } catch (err) {
      console.error(err);
      showToast(html.lang==='ar'?'حدث خطأ في تحميل البيانات':'Error loading data');
    }
  }
</script>
</body>
</html>
