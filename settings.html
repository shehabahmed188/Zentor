<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Zentor | الإعدادات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #2a7de1;
      --primary-hover: #1a67c4;
      --primary-light: #e8f1fc;
      --background: #f4f7fc;
      --card: #ffffff;
      --text: #0b1e33;
      --text-secondary: #5a6d80;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
      --glass-bg: rgba(255,255,255,0.65);
      --glass-border: rgba(255,255,255,0.4);
      --glass-blur: blur(14px);
      --radius: 16px;
      --radius-lg: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-width: 260px;
    }
    .dark {
      --background: #0b0e14;
      --card: #1a1f2b;
      --text: #eef2f6;
      --text-secondary: #9aa4b2;
      --border: #2a3140;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow: 0 4px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.4);
      --glass-bg: rgba(26,31,43,0.7);
      --glass-border: rgba(255,255,255,0.08);
      --primary-light: #1a2b44;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      width: var(--sidebar-width);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      padding: 1.5rem 1rem;
      transition: transform var(--transition);
    }
    [dir="rtl"] .sidebar { right: 0; border-right: none; border-left: 1px solid var(--glass-border); }
    [dir="ltr"] .sidebar { left: 0; }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .sidebar-logo i { font-size: 1.6rem; }
    .sidebar-nav { flex:1; display:flex; flex-direction: column; gap: 0.4rem; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: all var(--transition);
    }
    .sidebar-link i { width: 20px; text-align: center; }
    .sidebar-link:hover { background: var(--primary-light); color: var(--primary); }
    .sidebar-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(42,125,225,0.3); }
    .sidebar-footer { margin-top: auto; }
    .logout-btn {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

    .main {
      flex: 1;
      margin-right: var(--sidebar-width);
      padding: 1.5rem;
      transition: margin var(--transition);
    }
    [dir="ltr"] .main { margin-right: 0; margin-left: var(--sidebar-width); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .hamburger {
      display: none;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .page-title { font-size: 1.8rem; font-weight: 800; }
    .top-actions { display: flex; gap: 0.5rem; }
    .action-btn {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 1rem;
    }
    .action-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .sidebar-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.4); z-index: 999; }

    .settings-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      flex-wrap: wrap;
    }
    .setting-item:last-child { border-bottom: none; }
    .setting-info h4 {
      font-weight: 600;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .setting-info p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border);
      transition: var(--transition);
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: var(--transition);
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary);
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: all var(--transition);
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.9rem 1.8rem;
      border-radius: 50px;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 0.5rem;
      max-width: 90vw;
    }
    .toast-success { background: #dcfce7; color: #166534; border:1px solid #bbf7d0; }
    @keyframes slideUp {
      from { opacity:0; transform: translateX(-50%) translateY(20px); }
      to { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(100%); }
      [dir="ltr"] .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin: 0; }
      .hamburger { display: flex; }
      .sidebar-overlay.active { display: block; }
      .settings-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <a href="dashboard.html" class="sidebar-logo"><i class="fas fa-graduation-cap"></i> Zentor</a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> لوحة التحكم</a>
    <a href="my-courses.html" class="sidebar-link"><i class="fas fa-book-open"></i> كورساتي</a>
    <a href="browse-teachers.html" class="sidebar-link"><i class="fas fa-chalkboard-teacher"></i> المعلمين</a>
    <a href="assignments.html" class="sidebar-link"><i class="fas fa-tasks"></i> الواجبات</a>
    <a href="messages.html" class="sidebar-link"><i class="fas fa-comments"></i> الرسائل</a>
    <a href="profile.html" class="sidebar-link"><i class="fas fa-user-circle"></i> الملف الشخصي</a>
    <a href="settings.html" class="sidebar-link active"><i class="fas fa-cog"></i> الإعدادات</a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
  </div>
</div>
<div class="sidebar-overlay" id="overlay"></div>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    <h1 class="page-title">الإعدادات</h1>
    <div class="top-actions">
      <button class="action-btn" id="langToggleTop" title="English"><i class="fas fa-globe"></i></button>
      <button class="action-btn" id="darkToggleTop" title="الوضع الليلي"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <div class="settings-card">
    <!-- Language -->
    <div class="setting-item">
      <div class="setting-info">
        <h4><i class="fas fa-language"></i> <span id="langLabel">اللغة</span></h4>
        <p id="langDesc">اختر لغة التطبيق</p>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="langSwitch">
        <label class="slider" for="langSwitch"></label>
      </div>
    </div>

    <!-- Dark Mode -->
    <div class="setting-item">
      <div class="setting-info">
        <h4><i class="fas fa-moon"></i> <span id="darkLabel">الوضع الليلي</span></h4>
        <p id="darkDesc">تفعيل المظهر الداكن</p>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="darkSwitch">
        <label class="slider" for="darkSwitch"></label>
      </div>
    </div>

    <!-- Notifications (OneSignal optional) -->
    <div class="setting-item">
      <div class="setting-info">
        <h4><i class="fas fa-bell"></i> <span id="notifLabel">الإشعارات</span></h4>
        <p id="notifDesc">استلام إشعارات المنصة</p>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="notifSwitch">
        <label class="slider" for="notifSwitch"></label>
      </div>
    </div>

    <!-- Save button (optional, to confirm preferences) but they are applied instantly -->
    <div style="text-align:center; margin-top:1.5rem;">
      <button class="btn btn-primary" id="saveSettingsBtn">
        <i class="fas fa-check"></i> <span id="saveText">حفظ الإعدادات</span>
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast toast-success"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
    authDomain: "zentor-caaf1.firebaseapp.com",
    projectId: "zentor-caaf1",
    storageBucket: "zentor-caaf1.firebasestorage.app",
    messagingSenderId: "681267238383",
    appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
    measurementId: "G-X80GNJHMS5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const ONE_SIGNAL_APP_ID = "62bcddec-09ef-4689-8981-db7a57bbde8c";

  const html = document.documentElement;
  const darkToggleTop = document.getElementById('darkToggleTop');
  const langToggleTop = document.getElementById('langToggleTop');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const hamburger = document.getElementById('hamburger');
  const toast = document.getElementById('toast');
  const pageTitle = document.querySelector('.page-title');
  const logoutBtn = document.getElementById('logoutBtn');

  // Switches
  const langSwitch = document.getElementById('langSwitch');
  const darkSwitch = document.getElementById('darkSwitch');
  const notifSwitch = document.getElementById('notifSwitch');

  // Labels
  const langLabel = document.getElementById('langLabel');
  const langDesc = document.getElementById('langDesc');
  const darkLabel = document.getElementById('darkLabel');
  const darkDesc = document.getElementById('darkDesc');
  const notifLabel = document.getElementById('notifLabel');
  const notifDesc = document.getElementById('notifDesc');
  const saveText = document.getElementById('saveText');

  function showToast(msg) {
    toast.textContent = msg;
    toast.style.display = 'flex';
    clearTimeout(window._t);
    window._t = setTimeout(() => toast.style.display = 'none', 3000);
  }

  // Dark mode functions
  function applyDarkMode(isDark) {
    html.classList.toggle('dark', isDark);
    darkToggleTop.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    darkToggleTop.title = isDark ? (html.lang === 'ar' ? 'الوضع الفاتح' : 'Light Mode') : (html.lang === 'ar' ? 'الوضع الليلي' : 'Dark Mode');
    darkSwitch.checked = isDark;
  }

  function setDarkMode(isDark) {
    applyDarkMode(isDark);
    localStorage.setItem('zentor_dark_mode', isDark);
  }

  // Language functions
  function applyLanguage(lang) {
    const isArabic = lang === 'ar';
    html.dir = isArabic ? 'rtl' : 'ltr';
    html.lang = lang;
    langToggleTop.title = isArabic ? 'English' : 'العربية';
    langSwitch.checked = !isArabic; // If not Arabic, it's English -> switch on means English

    // Update all static texts
    pageTitle.textContent = isArabic ? 'الإعدادات' : 'Settings';
    logoutBtn.innerHTML = isArabic ? '<i class="fas fa-sign-out-alt"></i> تسجيل الخروج' : '<i class="fas fa-sign-out-alt"></i> Logout';
    langLabel.textContent = isArabic ? 'اللغة' : 'Language';
    langDesc.textContent = isArabic ? 'اختر لغة التطبيق' : 'Choose app language';
    darkLabel.textContent = isArabic ? 'الوضع الليلي' : 'Dark Mode';
    darkDesc.textContent = isArabic ? 'تفعيل المظهر الداكن' : 'Enable dark theme';
    notifLabel.textContent = isArabic ? 'الإشعارات' : 'Notifications';
    notifDesc.textContent = isArabic ? 'استلام إشعارات المنصة' : 'Receive platform notifications';
    saveText.textContent = isArabic ? 'حفظ الإعدادات' : 'Save Settings';

    // Update sidebar links
    const links = document.querySelectorAll('.sidebar-link');
    const arabicLabels = ['لوحة التحكم','كورساتي','المعلمين','الواجبات','الرسائل','الملف الشخصي','الإعدادات'];
    const englishLabels = ['Dashboard','My Courses','Teachers','Assignments','Messages','Profile','Settings'];
    const icons = ['fa-th-large','fa-book-open','fa-chalkboard-teacher','fa-tasks','fa-comments','fa-user-circle','fa-cog'];
    links.forEach((link, i) => {
      link.innerHTML = `<i class="fas ${icons[i]}"></i> ${isArabic ? arabicLabels[i] : englishLabels[i]}`;
    });

    // Update dark mode toggle title
    applyDarkMode(html.classList.contains('dark'));
  }

  function setLanguage(lang) {
    applyLanguage(lang);
    localStorage.setItem('zentor_lang', lang);
  }

  // Notifications (OneSignal) - manage preference
  function applyNotifPref(enabled) {
    notifSwitch.checked = enabled;
    localStorage.setItem('zentor_notifications', enabled ? 'true' : 'false');
    // If enabled and OneSignal is configured, we could initialize, but that's complex.
    // We'll just show a message for now.
  }

  // Initialize from localStorage
  const savedDark = localStorage.getItem('zentor_dark_mode') === 'true';
  const savedLang = localStorage.getItem('zentor_lang') || 'ar';
  const savedNotif = localStorage.getItem('zentor_notifications') !== 'false'; // default true

  applyDarkMode(savedDark);
  applyLanguage(savedLang);
  applyNotifPref(savedNotif);

  // Event listeners for topbar buttons
  darkToggleTop.addEventListener('click', () => {
    setDarkMode(!html.classList.contains('dark'));
  });

  langToggleTop.addEventListener('click', () => {
    const newLang = html.lang === 'ar' ? 'en' : 'ar';
    setLanguage(newLang);
  });

  // Switches
  darkSwitch.addEventListener('change', () => {
    setDarkMode(darkSwitch.checked);
  });

  langSwitch.addEventListener('change', () => {
    // If langSwitch is checked -> English, else Arabic
    const newLang = langSwitch.checked ? 'en' : 'ar';
    setLanguage(newLang);
  });

  notifSwitch.addEventListener('change', () => {
    applyNotifPref(notifSwitch.checked);
    showToast(notifSwitch.checked ? (html.lang === 'ar' ? 'تم تفعيل الإشعارات' : 'Notifications enabled') : (html.lang === 'ar' ? 'تم تعطيل الإشعارات' : 'Notifications disabled'));
    // If OneSignal was to be enabled, you'd call OneSignal.setSubscription(notifSwitch.checked) etc.
  });

  // Save settings button (just a confirmation toast)
  document.getElementById('saveSettingsBtn').addEventListener('click', () => {
    showToast(html.lang === 'ar' ? 'تم حفظ الإعدادات' : 'Settings saved');
  });

  // Sidebar
  hamburger.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });

  // Logout
  logoutBtn.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'login.html';
  });

  // Auth check
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    const profileSnap = await getDoc(doc(db, 'students', user.uid, 'profile', 'info'));
    if (!profileSnap.exists()) {
      await signOut(auth);
      showToast('هذا الحساب ليس حساب طالب');
      setTimeout(() => window.location.href = 'login.html', 2000);
    }
  });
</script>
</body>
</html>
