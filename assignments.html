<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Zentor | الواجبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #2a7de1;
      --primary-hover: #1a67c4;
      --primary-light: #e8f1fc;
      --background: #f4f7fc;
      --card: #ffffff;
      --text: #0b1e33;
      --text-secondary: #5a6d80;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
      --glass-bg: rgba(255,255,255,0.65);
      --glass-border: rgba(255,255,255,0.4);
      --glass-blur: blur(14px);
      --radius: 16px;
      --radius-lg: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-width: 260px;
      --success: #16a34a;
      --error: #dc2626;
      --warning: #f59e0b;
    }
    .dark {
      --background: #0b0e14;
      --card: #1a1f2b;
      --text: #eef2f6;
      --text-secondary: #9aa4b2;
      --border: #2a3140;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow: 0 4px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.4);
      --glass-bg: rgba(26,31,43,0.7);
      --glass-border: rgba(255,255,255,0.08);
      --primary-light: #1a2b44;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }
    .sidebar {
      position: fixed;
      top: 0; bottom: 0;
      width: var(--sidebar-width);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      padding: 1.5rem 1rem;
      transition: transform var(--transition);
    }
    [dir="rtl"] .sidebar { right: 0; border-right: none; border-left: 1px solid var(--glass-border); }
    [dir="ltr"] .sidebar { left: 0; }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .sidebar-logo i { font-size: 1.6rem; }
    .sidebar-nav { flex:1; display:flex; flex-direction: column; gap: 0.4rem; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: all var(--transition);
    }
    .sidebar-link i { width: 20px; text-align: center; }
    .sidebar-link:hover { background: var(--primary-light); color: var(--primary); }
    .sidebar-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(42,125,225,0.3); }
    .sidebar-footer { margin-top: auto; }
    .logout-btn {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

    .main {
      flex: 1;
      margin-right: var(--sidebar-width);
      padding: 1.5rem;
      transition: margin var(--transition);
    }
    [dir="ltr"] .main { margin-right: 0; margin-left: var(--sidebar-width); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .hamburger {
      display: none;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .page-title { font-size: 1.8rem; font-weight: 800; }
    .top-actions { display: flex; gap: 0.5rem; }
    .action-btn {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 1rem;
    }
    .action-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .sidebar-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.4); z-index: 999; }

    .assignments-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .assignment-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: all var(--transition);
    }
    .assignment-card:hover {
      box-shadow: var(--shadow);
    }
    .assignment-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .assignment-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .assignment-course {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .assignment-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .assignment-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .assignment-meta i { margin-left: 0.3rem; color: var(--primary); }
    [dir="ltr"] .assignment-meta i { margin-left: 0; margin-right: 0.3rem; }

    .submission-area {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }
    .submission-status {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .status-badge {
      padding: 0.25rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .dark .status-pending { background: #3b2e0a; color: #fbbf24; }
    .status-submitted { background: #e0f2fe; color: #075985; }
    .dark .status-submitted { background: #0c2d48; color: #7dd3fc; }
    .status-graded { background: #dcfce7; color: #166534; }
    .dark .status-graded { background: #1a3a2a; color: #86efac; }

    .grade-display {
      font-weight: 700;
      color: var(--primary);
    }
    .file-input-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    input[type="file"] {
      display: none;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: all var(--transition);
    }
    .btn-sm { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, transparent 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card {
      height: 220px;
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    .empty-state i { font-size: 3.5rem; color: var(--border); margin-bottom: 1rem; }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.9rem 1.8rem;
      border-radius: 50px;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 0.5rem;
      max-width: 90vw;
    }
    .toast-error { background: #fee2e2; color: #991b1b; border:1px solid #fecaca; }
    .toast-success { background: #dcfce7; color: #166534; border:1px solid #bbf7d0; }
    @keyframes slideUp {
      from { opacity:0; transform: translateX(-50%) translateY(20px); }
      to { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(100%); }
      [dir="ltr"] .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin: 0; }
      .hamburger { display: flex; }
      .sidebar-overlay.active { display: block; }
    }
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <a href="dashboard.html" class="sidebar-logo"><i class="fas fa-graduation-cap"></i> Zentor</a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> لوحة التحكم</a>
    <a href="my-courses.html" class="sidebar-link"><i class="fas fa-book-open"></i> كورساتي</a>
    <a href="browse-teachers.html" class="sidebar-link"><i class="fas fa-chalkboard-teacher"></i> المعلمين</a>
    <a href="assignments.html" class="sidebar-link active"><i class="fas fa-tasks"></i> الواجبات</a>
    <a href="messages.html" class="sidebar-link"><i class="fas fa-comments"></i> الرسائل</a>
    <a href="profile.html" class="sidebar-link"><i class="fas fa-user-circle"></i> الملف الشخصي</a>
    <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> الإعدادات</a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
  </div>
</div>
<div class="sidebar-overlay" id="overlay"></div>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    <h1 class="page-title">الواجبات</h1>
    <div class="top-actions">
      <button class="action-btn" id="langToggle" title="English"><i class="fas fa-globe"></i></button>
      <button class="action-btn" id="darkToggle" title="الوضع الليلي"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <div class="assignments-container" id="assignmentsContainer">
    <!-- skeleton loading -->
    <div class="skeleton-card">
      <div class="skeleton" style="height:1.2rem;width:70%;margin-bottom:1rem;"></div>
      <div class="skeleton" style="height:0.8rem;width:40%;margin-bottom:1rem;"></div>
      <div class="skeleton" style="height:0.8rem;width:60%;margin-bottom:1rem;"></div>
      <div class="skeleton" style="height:2rem;width:8rem;border-radius:50px;"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton" style="height:1.2rem;width:70%;margin-bottom:1rem;"></div>
      <div class="skeleton" style="height:0.8rem;width:40%;margin-bottom:1rem;"></div>
      <div class="skeleton" style="height:0.8rem;width:60%;margin-bottom:1rem;"></div>
      <div class="skeleton" style="height:2rem;width:8rem;border-radius:50px;"></div>
    </div>
  </div>
  <div class="empty-state" id="emptyState" style="display:none">
    <i class="fas fa-clipboard-list"></i>
    <h3>لا توجد واجبات حالياً</h3>
    <p>ستظهر الواجبات الخاصة بكورساتك هنا</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import { 
    getFirestore, 
    doc, 
    getDoc, 
    collection, 
    getDocs, 
    query, 
    where, 
    setDoc, 
    serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
    authDomain: "zentor-caaf1.firebaseapp.com",
    projectId: "zentor-caaf1",
    storageBucket: "zentor-caaf1.firebasestorage.app",
    messagingSenderId: "681267238383",
    appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
    measurementId: "G-X80GNJHMS5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Cloudinary config
  const CLOUD_NAME = "deaevfmvm";
  const UPLOAD_PRESET = "ml_default";

  const html = document.documentElement;
  const darkToggle = document.getElementById('darkToggle');
  const langToggle = document.getElementById('langToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const hamburger = document.getElementById('hamburger');
  const assignmentsContainer = document.getElementById('assignmentsContainer');
  const emptyState = document.getElementById('emptyState');
  const toast = document.getElementById('toast');
  const pageTitle = document.querySelector('.page-title');
  const logoutBtn = document.getElementById('logoutBtn');

  let currentUser = null;

  function showToast(msg, type='error') {
    toast.textContent = msg;
    toast.className = `toast toast-${type}`;
    toast.style.display = 'flex';
    clearTimeout(window._t);
    window._t = setTimeout(() => toast.style.display = 'none', 4000);
  }

  // Dark mode
  function setDark(on) {
    html.classList.toggle('dark', on);
    darkToggle.innerHTML = on ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('zentor_dark_mode', on);
  }
  darkToggle.addEventListener('click', ()=> setDark(!html.classList.contains('dark')));
  setDark(localStorage.getItem('zentor_dark_mode') === 'true');

  // Language
  function setLang(lang) {
    html.dir = lang === 'ar' ? 'rtl' : 'ltr';
    html.lang = lang;
    langToggle.title = lang === 'ar' ? 'English' : 'العربية';
    pageTitle.textContent = lang === 'ar' ? 'الواجبات' : 'Assignments';
    logoutBtn.innerHTML = lang === 'ar' ? '<i class="fas fa-sign-out-alt"></i> تسجيل الخروج' : '<i class="fas fa-sign-out-alt"></i> Logout';
    // Update sidebar links
    const links = document.querySelectorAll('.sidebar-link');
    const arabicLabels = ['لوحة التحكم','كورساتي','المعلمين','الواجبات','الرسائل','الملف الشخصي','الإعدادات'];
    const englishLabels = ['Dashboard','My Courses','Teachers','Assignments','Messages','Profile','Settings'];
    const icons = ['fa-th-large','fa-book-open','fa-chalkboard-teacher','fa-tasks','fa-comments','fa-user-circle','fa-cog'];
    links.forEach((link, i) => {
      link.innerHTML = `<i class="fas ${icons[i]}"></i> ${lang === 'ar' ? arabicLabels[i] : englishLabels[i]}`;
    });
    localStorage.setItem('zentor_lang', lang);
    // Re-render assignments if data exists
    if (window._assignmentsData) renderAssignments(window._assignmentsData);
  }
  langToggle.addEventListener('click', ()=> setLang(html.lang === 'ar' ? 'en' : 'ar'));
  setLang(localStorage.getItem('zentor_lang') || 'ar');

  // Sidebar
  hamburger.addEventListener('click', ()=>{
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', ()=>{
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });

  // Logout
  logoutBtn.addEventListener('click', async ()=>{
    await signOut(auth);
    window.location.href = 'login.html';
  });

  // Auth
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    const profileSnap = await getDoc(doc(db, 'students', user.uid, 'profile', 'info'));
    if (!profileSnap.exists()) {
      await signOut(auth);
      showToast('هذا الحساب ليس حساب طالب');
      setTimeout(()=> window.location.href = 'login.html', 2000);
      return;
    }
    loadAssignments();
  });

  async function loadAssignments() {
    try {
      const uid = currentUser.uid;
      // Get all enrolled courses
      const coursesSnap = await getDocs(collection(db, 'students', uid, 'courses'));
      const courses = [];
      coursesSnap.forEach(doc => courses.push({ id: doc.id, ...doc.data() }));

      const allAssignments = [];
      for (const course of courses) {
        const teacherId = course.teacherId;
        const courseId = course.courseId;
        if (!teacherId || !courseId) continue;
        // Fetch assignments for this course
        const assignmentsQuery = query(collection(db, 'teachers', teacherId, 'assignments'), where('courseId', '==', courseId));
        const assignmentsSnap = await getDocs(assignmentsQuery);
        for (const assignmentDoc of assignmentsSnap.docs) {
          const assignmentData = assignmentDoc.data();
          // Check submission
          const submissionRef = doc(db, 'teachers', teacherId, 'assignments', assignmentDoc.id, 'submissions', uid);
          const submissionSnap = await getDoc(submissionRef);
          let submission = null;
          if (submissionSnap.exists()) {
            submission = submissionSnap.data();
          }
          allAssignments.push({
            id: assignmentDoc.id,
            teacherId,
            courseId,
            courseName: course.courseName || courseId,
            ...assignmentData,
            submission
          });
        }
      }

      window._assignmentsData = allAssignments;
      if (allAssignments.length === 0) {
        assignmentsContainer.innerHTML = '';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        renderAssignments(allAssignments);
      }
    } catch (err) {
      console.error(err);
      showToast('حدث خطأ في تحميل الواجبات');
    }
  }

  function renderAssignments(assignments) {
    const isArabic = html.lang === 'ar';
    assignmentsContainer.innerHTML = assignments.map(assignment => {
      const submission = assignment.submission;
      const hasSubmission = !!submission;
      const graded = submission?.grade !== undefined && submission?.grade !== null;
      let statusClass = 'status-pending';
      let statusText = isArabic ? 'لم يتم التسليم' : 'Not submitted';
      if (hasSubmission && !graded) {
        statusClass = 'status-submitted';
        statusText = isArabic ? 'تم التسليم - قيد التصحيح' : 'Submitted - under review';
      } else if (graded) {
        statusClass = 'status-graded';
        statusText = isArabic ? 'تم التصحيح' : 'Graded';
      }

      return `
        <div class="assignment-card">
          <div class="assignment-header">
            <div>
              <div class="assignment-title">${assignment.title || (isArabic ? 'واجب بدون عنوان' : 'Untitled Assignment')}</div>
              <div class="assignment-course">${isArabic ? 'كورس: ' : 'Course: '} ${assignment.courseName}</div>
            </div>
            <span class="status-badge ${statusClass}">${statusText}</span>
          </div>
          ${assignment.description ? `<div class="assignment-desc">${assignment.description}</div>` : ''}
          <div class="assignment-meta">
            ${assignment.deadline ? `<span><i class="fas fa-calendar-alt"></i> ${isArabic ? 'الموعد النهائي: ' : 'Deadline: '} ${assignment.deadline}</span>` : ''}
            ${assignment.totalMarks ? `<span><i class="fas fa-star"></i> ${isArabic ? 'الدرجة الكلية: ' : 'Total Marks: '} ${assignment.totalMarks}</span>` : ''}
          </div>
          <div class="submission-area">
            ${graded 
              ? `<div class="submission-status">
                   <i class="fas fa-check-circle" style="color:var(--success);"></i>
                   <span>${isArabic ? 'درجتك: ' : 'Your Grade: '} <span class="grade-display">${submission.grade} / ${assignment.totalMarks || '?'}</span></span>
                   ${submission.feedback ? `<p style="color:var(--text-secondary);font-size:0.9rem;">${submission.feedback}</p>` : ''}
                 </div>`
              : (hasSubmission 
                ? `<div class="submission-status">
                     <i class="fas fa-file-alt" style="color:var(--primary);"></i>
                     <span>${isArabic ? 'تم التسليم' : 'Submitted'}</span>
                     <a href="${submission.fileUrl}" target="_blank" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i> ${isArabic ? 'عرض الملف' : 'View File'}</a>
                   </div>`
                : `<div class="submission-status">
                     <i class="fas fa-upload" style="color:var(--text-secondary);"></i>
                     <span>${isArabic ? 'ارفع ملف التسليم' : 'Upload your submission'}</span>
                   </div>
                   <div class="file-input-wrapper">
                     <input type="file" id="file-${assignment.id}" class="assignment-file" data-assignment-id="${assignment.id}" data-teacher-id="${assignment.teacherId}" data-course-id="${assignment.courseId}" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.ppt,.pptx">
                     <label for="file-${assignment.id}" class="btn btn-outline btn-sm"><i class="fas fa-paperclip"></i> ${isArabic ? 'اختر ملف' : 'Choose File'}</label>
                     <span class="file-name" id="fileName-${assignment.id}"></span>
                     <button class="btn btn-primary btn-sm upload-btn" data-assignment-id="${assignment.id}" data-teacher-id="${assignment.teacherId}" data-course-id="${assignment.courseId}" disabled><i class="fas fa-cloud-upload-alt"></i> ${isArabic ? 'رفع' : 'Upload'}</button>
                   </div>`
              )
            }
          </div>
        </div>
      `;
    });

    // Attach file input change events
    document.querySelectorAll('.assignment-file').forEach(input => {
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const assignmentId = input.dataset.assignmentId;
        const fileNameSpan = document.getElementById(`fileName-${assignmentId}`);
        const uploadBtn = document.querySelector(`.upload-btn[data-assignment-id="${assignmentId}"]`);
        if (file) {
          fileNameSpan.textContent = file.name;
          uploadBtn.disabled = false;
        } else {
          fileNameSpan.textContent = '';
          uploadBtn.disabled = true;
        }
      });
    });

    // Attach upload button events
    document.querySelectorAll('.upload-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const assignmentId = btn.dataset.assignmentId;
        const teacherId = btn.dataset.teacherId;
        const courseId = btn.dataset.courseId;
        const fileInput = document.getElementById(`file-${assignmentId}`);
        const file = fileInput.files[0];
        if (!file) return;

        btn.disabled = true;
        btn.classList.add('loading');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (html.lang === 'ar' ? 'جار الرفع...' : 'Uploading...');

        try {
          // Upload to Cloudinary
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', UPLOAD_PRESET);
          formData.append('folder', 'zentor_assignments');
          const cloudinaryRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
            method: 'POST',
            body: formData
          });
          const cloudinaryData = await cloudinaryRes.json();
          if (!cloudinaryData.secure_url) {
            throw new Error('Upload failed');
          }

          // Save submission in Firestore
          const submissionRef = doc(db, 'teachers', teacherId, 'assignments', assignmentId, 'submissions', currentUser.uid);
          await setDoc(submissionRef, {
            fileUrl: cloudinaryData.secure_url,
            fileName: file.name,
            submittedAt: serverTimestamp(),
            studentName: currentUser.displayName || currentUser.email,
            status: 'submitted'
          });

          showToast(html.lang === 'ar' ? 'تم رفع الواجب بنجاح!' : 'Assignment submitted successfully!', 'success');
          // Reload assignments to show updated status
          loadAssignments();
        } catch (error) {
          console.error(error);
          showToast(html.lang === 'ar' ? 'فشل رفع الملف. حاول مرة أخرى.' : 'Upload failed. Please try again.');
        } finally {
          btn.disabled = false;
          btn.classList.remove('loading');
          btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ' + (html.lang === 'ar' ? 'رفع' : 'Upload');
        }
      });
    });
  }
</script>
</body>
</html>
